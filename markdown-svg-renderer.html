<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Helvetica, Arial, sans-serif;
  margin: 0;
  background: #fafafa;
  color: #1a1a1a;
}

.app {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
}

.app.viewer-mode {
  grid-template-columns: minmax(0, 1fr);
}

.app.viewer-mode .editor-pane {
  display: none;
}

.pane {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.pane-header {
  padding: 10px 16px;
  font-size: 13px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #888;
  border-bottom: 1px solid #e2e2e2;
  background: #fff;
}

.editor-pane {
  border-right: 1px solid #e2e2e2;
}

.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.source-toggle {
  display: none;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border: 1px solid #e2e2e2;
  border-radius: 6px;
  background: #fff;
  color: #777;
  cursor: pointer;
}

.source-toggle:hover,
.source-toggle:focus-visible {
  color: #2563eb;
  border-color: #bfdbfe;
  outline: none;
}

.source-toggle svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
}

.app.has-url-content .source-toggle {
  display: inline-flex;
}

.app.viewer-mode .source-toggle {
  opacity: 0.72;
}

.app.viewer-mode #output {
  max-width: 980px;
  width: 100%;
  margin: 0 auto;
}

.source-tabs {
  display: flex;
  gap: 4px;
}

.source-tabs button {
  font-family: Helvetica, Arial, sans-serif;
  font-size: 12px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid #e2e2e2;
  background: #f6f6f6;
  color: #888;
  padding: 4px 10px;
  border-radius: 5px;
  cursor: pointer;
}

.source-tabs button.active {
  background: #2563eb;
  border-color: #2563eb;
  color: #fff;
}

.url-bar {
  display: none;
  gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid #e2e2e2;
  background: #fff;
}

.url-bar.active { display: flex; }

#url-input {
  flex: 1;
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 8px 10px;
  font-family: Helvetica, Arial, sans-serif;
  font-size: 16px;
  outline: none;
}

#url-input:focus { border-color: #2563eb; }

#url-load {
  font-family: Helvetica, Arial, sans-serif;
  font-size: 14px;
  border: none;
  background: #2563eb;
  color: #fff;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
}

#url-status {
  padding: 8px 16px;
  font-size: 13px;
  color: #888;
  border-bottom: 1px solid #e2e2e2;
  background: #fff;
  display: none;
}

#url-status.active { display: block; }
#url-status.error { color: #dc2626; }

#input {
  flex: 1;
  border: none;
  outline: none;
  resize: none;
  padding: 16px;
  font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
  font-size: 16px;
  line-height: 1.5;
  background: #fff;
}

#output {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
  line-height: 1.6;
}

#output h1, #output h2, #output h3, #output h4 {
  line-height: 1.25;
  margin-top: 1.5em;
  margin-bottom: 0.5em;
}

#output h1 { font-size: 2em; border-bottom: 1px solid #e2e2e2; padding-bottom: 0.3em; }
#output h2 { font-size: 1.5em; border-bottom: 1px solid #e2e2e2; padding-bottom: 0.3em; }
#output h3 { font-size: 1.25em; }

#output p { margin: 0.8em 0; }

#output code {
  background: #f0f0f0;
  padding: 2px 5px;
  border-radius: 3px;
  font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
  font-size: 0.9em;
}

#output pre {
  background: #f6f6f6;
  padding: 14px 16px;
  border-radius: 6px;
  overflow-x: auto;
  border: 1px solid #e8e8e8;
}

#output pre code {
  background: none;
  padding: 0;
}

#output blockquote {
  margin: 0.8em 0;
  padding-left: 16px;
  border-left: 4px solid #ddd;
  color: #666;
}

#output table {
  border-collapse: collapse;
  margin: 1em 0;
}

#output th, #output td {
  border: 1px solid #ddd;
  padding: 6px 12px;
}

#output th { background: #f6f6f6; }

#output a { color: #2563eb; }

#output img { max-width: 100%; }

#output hr {
  border: none;
  border-top: 1px solid #e2e2e2;
  margin: 1.5em 0;
}

@media (max-width: 700px) {
  .app { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  .app.viewer-mode { grid-template-rows: 1fr; }
  .editor-pane { border-right: none; border-bottom: 1px solid #e2e2e2; }
}
</style>

<div class="app">
  <div class="pane editor-pane">
    <div class="pane-header">
      <span class="source-tabs">
        <button id="tab-paste" class="active" type="button">Paste</button>
        <button id="tab-url" type="button">URL</button>
      </span>
    </div>
    <div class="url-bar" id="url-bar">
      <input id="url-input" type="url" spellcheck="false"
        placeholder="Raw markdown URL or https://gist.github.com/...">
      <button id="url-load" type="button">Load</button>
    </div>
    <div id="url-status"></div>
    <textarea id="input" spellcheck="false"></textarea>
  </div>
  <div class="pane preview-pane">
    <div class="pane-header preview-header">
      <span>Preview</span>
      <button id="source-toggle" class="source-toggle" type="button"
        title="Show source" aria-label="Show source" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="16" rx="2"></rect>
          <path d="M9 4v16"></path>
          <path d="m14 9 3 3-3 3"></path>
        </svg>
      </button>
    </div>
    <div id="output"></div>
  </div>
</div>

<script
  src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.1/dist/markdown-it.min.js"
  integrity="sha384-VjNpj0uWy3ya2VFiHXeS6MxjLjWGb1mSZTNAF0xfbZguX+9CXmTkYSmOxEyUWJ9S"
  crossorigin="anonymous"></script>
<script
  src="https://cdn.jsdelivr.net/npm/dompurify@3.3.3/dist/purify.min.js"
  integrity="sha384-pcBjnGbkyKeOXaoFkmJiuR9E08/6gkmus6/Strimnxtl3uk0Hx23v345pWyC/MMr"
  crossorigin="anonymous"></script>

<script type="module">
// ---- SVG tab web component ----
function svgAspectRatio(svg) {
  let ratio = "1 / 1";
  const m = svg.match(/viewBox\s*=\s*["']([\d.\s-]+)["']/i);
  if (m) {
    const parts = m[1].trim().split(/\s+/).map(Number);
    if (parts.length === 4 && parts[2] > 0 && parts[3] > 0) {
      ratio = `${parts[2]} / ${parts[3]}`;
    }
  } else {
    const w = svg.match(/\bwidth\s*=\s*["']?([\d.]+)/i);
    const h = svg.match(/\bheight\s*=\s*["']?([\d.]+)/i);
    if (w && h && +h[1] > 0) ratio = `${+w[1]} / ${+h[1]}`;
  }
  return ratio;
}

function svgPreviewDocument(svg) {
  return `<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: #fff;
}
svg {
  width: 100%;
  height: 100%;
  display: block;
}
</style>
</head>
<body>${svg}${"</" + "body>"}
${"</" + "html>"}`;
}

class SvgBlock extends HTMLElement {
  connectedCallback() {
    if (this.shadowRoot) return;

    const code = this.getAttribute("data-svg") || "";
    const shadow = this.attachShadow({ mode: "open" });

    shadow.innerHTML = `
      <style>
        :host {
          display: block;
          max-width: 100%;
          margin: 1em 0;
          border: 1px solid #e2e2e2;
          border-radius: 8px;
          overflow: hidden;
          font-family: Helvetica, Arial, sans-serif;
        }
        .tabs {
          display: flex;
          border-bottom: 1px solid #e2e2e2;
          background: #f6f6f6;
        }
        button {
          font-family: inherit;
          font-size: 13px;
          border: none;
          background: none;
          padding: 8px 16px;
          cursor: pointer;
          color: #666;
          border-bottom: 2px solid transparent;
          margin-bottom: -1px;
        }
        button.active {
          color: #1a1a1a;
          font-weight: bold;
          border-bottom-color: #2563eb;
          background: #fff;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        .svg-wrap {
          width: 100%;
          background: #fff;
          padding: 12px;
        }
        iframe {
          display: block;
          width: 100%;
          height: 100%;
          border: 0;
          background: #fff;
        }
        pre {
          margin: 0;
          padding: 14px 16px;
          overflow-x: auto;
          background: #1e1e1e;
          color: #e8e8e8;
          font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
          font-size: 13px;
          line-height: 1.5;
        }
      </style>
      <div class="tabs">
        <button class="active" data-tab="render">Rendered</button>
        <button data-tab="code">Code</button>
      </div>
      <div class="panel active" data-panel="render">
        <div class="svg-wrap">
          <iframe title="Rendered SVG" sandbox="" referrerpolicy="no-referrer"></iframe>
        </div>
      </div>
      <div class="panel" data-panel="code"><pre></pre></div>
    `;

    shadow.querySelector(".svg-wrap").style.aspectRatio = svgAspectRatio(code);
    shadow.querySelector("iframe").srcdoc = svgPreviewDocument(code);
    shadow.querySelector("pre").textContent = code;

    const buttons = shadow.querySelectorAll("button");
    const panels = shadow.querySelectorAll(".panel");
    buttons.forEach((btn) => {
      btn.addEventListener("click", () => {
        const tab = btn.dataset.tab;
        buttons.forEach((b) => b.classList.toggle("active", b === btn));
        panels.forEach((p) =>
          p.classList.toggle("active", p.dataset.panel === tab)
        );
      });
    });
  }
}
customElements.define("svg-block", SvgBlock);

// ---- Markdown rendering ----
const markdownSanitizeConfig = {
  USE_PROFILES: { html: true },
  ADD_ATTR: ["data-svg"],
  FORBID_ATTR: ["style"],
  FORBID_TAGS: ["style"]
};

const svgSanitizeConfig = {
  USE_PROFILES: { svg: true },
  FORBID_ATTR: ["href", "xlink:href", "src", "style"],
  FORBID_TAGS: [
    "animate",
    "animateMotion",
    "animatemotion",
    "animateTransform",
    "animatetransform",
    "audio",
    "embed",
    "foreignObject",
    "foreignobject",
    "iframe",
    "image",
    "link",
    "object",
    "script",
    "set",
    "style",
    "use",
    "video"
  ]
};

const md = window.markdownit({
  html: false,
  linkify: false,
  typographer: false
});

function escapeAttr(s) {
  return s
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

const defaultFenceRenderer = md.renderer.rules.fence;
md.renderer.rules.fence = (tokens, idx, options, env, self) => {
  const token = tokens[idx];
  const lang = (token.info || "").trim().split(/\s+/)[0].toLowerCase();

  if (lang === "svg") {
    const svg = window.DOMPurify.sanitize(token.content, svgSanitizeConfig).trim();
    if (svg) {
      return `<div class="svg-block-placeholder" data-svg="${escapeAttr(svg)}"></div>\n`;
    }
  }

  return defaultFenceRenderer(tokens, idx, options, env, self);
};

function hydrateSvgBlocks(root) {
  root.querySelectorAll(".svg-block-placeholder[data-svg]").forEach((placeholder) => {
    const block = document.createElement("svg-block");
    block.setAttribute("data-svg", placeholder.getAttribute("data-svg") || "");
    placeholder.replaceWith(block);
  });
}

function renderMarkdown(src) {
  const html = md.render(src);
  return window.DOMPurify.sanitize(html, markdownSanitizeConfig);
}

const app = document.querySelector(".app");
const input = document.getElementById("input");
const output = document.getElementById("output");
const tabPaste = document.getElementById("tab-paste");
const tabUrl = document.getElementById("tab-url");
const urlBar = document.getElementById("url-bar");
const urlInput = document.getElementById("url-input");
const urlLoad = document.getElementById("url-load");
const urlStatus = document.getElementById("url-status");
const sourceToggle = document.getElementById("source-toggle");

function update() {
  output.innerHTML = renderMarkdown(input.value);
  hydrateSvgBlocks(output);
}

input.addEventListener("input", update);

function setViewerMode(enabled) {
  app.classList.toggle("viewer-mode", enabled);
  sourceToggle.setAttribute("aria-pressed", enabled ? "true" : "false");
  sourceToggle.setAttribute("aria-label", enabled ? "Show source" : "Hide source");
  sourceToggle.title = enabled ? "Show source" : "Hide source";
}

function setUrlContentLoaded(enabled) {
  app.classList.toggle("has-url-content", enabled);
  if (!enabled) setViewerMode(false);
}

sourceToggle.addEventListener("click", () => {
  setViewerMode(!app.classList.contains("viewer-mode"));
});

// ---- Source mode switching ----
function setMode(mode) {
  const isUrl = mode === "url";
  tabUrl.classList.toggle("active", isUrl);
  tabPaste.classList.toggle("active", !isUrl);
  urlBar.classList.toggle("active", isUrl);
  input.readOnly = isUrl;
  input.style.background = isUrl ? "#f9f9f9" : "#fff";
}

tabPaste.addEventListener("click", () => {
  setUrlContentLoaded(false);
  setMode("paste");
  input.readOnly = false;
  input.style.background = "#fff";
  if (location.hash) history.pushState("", document.title, location.pathname + location.search);
});

tabUrl.addEventListener("click", () => setMode("url"));

function setStatus(msg, isError) {
  if (!msg) {
    urlStatus.classList.remove("active", "error");
    urlStatus.textContent = "";
    return;
  }
  urlStatus.textContent = msg;
  urlStatus.classList.add("active");
  urlStatus.classList.toggle("error", !!isError);
}

// Match a gist URL and capture the gist id (the long hex segment).
const gistRe = /^https?:\/\/gist\.github\.com\/(?:[^/]+\/)?([0-9a-f]+)/i;

function normalizeSourceUrl(rawUrl) {
  let parsed;
  try {
    parsed = new URL(rawUrl.trim());
  } catch {
    throw new Error("Enter a valid URL");
  }
  if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
    throw new Error("Only http and https URLs are supported");
  }
  return parsed.href;
}

async function fetchSource(url) {
  const sourceUrl = normalizeSourceUrl(url);
  const gistMatch = gistRe.exec(sourceUrl);
  if (gistMatch) {
    const id = gistMatch[1];
    const res = await fetch(`https://api.github.com/gists/${id}`);
    if (!res.ok) throw new Error(`Gist API returned ${res.status}`);
    const data = await res.json();
    const files = data.files || {};
    const names = Object.keys(files);
    if (!names.length) throw new Error("Gist contains no files");
    const first = files[names[0]];
    // The API truncates large files; fall back to raw_url if so.
    if (first.truncated && first.raw_url) {
      const raw = await fetch(first.raw_url);
      if (!raw.ok) throw new Error(`Raw fetch returned ${raw.status}`);
      return await raw.text();
    }
    return first.content;
  }
  // Plain raw markdown URL.
  const res = await fetch(sourceUrl);
  if (!res.ok) throw new Error(`Fetch returned ${res.status}`);
  return await res.text();
}

async function loadFromUrl(url, recordHash) {
  setMode("url");
  urlInput.value = url;
  setStatus("Loading…");
  try {
    const text = await fetchSource(url);
    input.value = text;
    update();
    setStatus("");
    setUrlContentLoaded(true);
    setViewerMode(true);
    if (recordHash) {
      const newHash = "#url=" + encodeURIComponent(url);
      if (location.hash !== newHash) {
        history.pushState({ url }, "", newHash);
      }
    }
  } catch (err) {
    setStatus("Error: " + err.message, true);
  }
}

urlLoad.addEventListener("click", () => {
  const url = urlInput.value.trim();
  if (url) loadFromUrl(url, true);
});

urlInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    urlLoad.click();
  }
});

// ---- Fragment-based load on startup / navigation ----
function urlFromHash() {
  const m = /^#url=(.+)$/.exec(location.hash);
  return m ? decodeURIComponent(m[1]) : null;
}

window.addEventListener("popstate", () => {
  const url = urlFromHash();
  if (url) {
    loadFromUrl(url, false);
  }
});

const sample = `# Markdown renderer

Paste **markdown** here and watch it render on the right.

## Features

- Headings, *emphasis*, and \`inline code\`
- Lists, tables, blockquotes
- Standard \`\`\`code\`\`\` blocks
- Special SVG blocks with tabs
- Load from a raw markdown URL or a Gist

> SVG fenced blocks render as a tabbed component.

\`\`\`svg
<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="200" height="120" fill="#2563eb"/>
  <circle cx="100" cy="60" r="40" fill="#fbbf24"/>
  <text x="100" y="66" text-anchor="middle" font-family="Helvetica" font-size="18" fill="#1a1a1a">SVG</text>
</svg>
\`\`\`

| Feature | Supported |
|---------|-----------|
| Tables  | Yes       |
| SVG tabs| Yes       |
`;

// On load: if a URL is in the fragment, switch to URL tab and load it.
const startupUrl = urlFromHash();
if (startupUrl) {
  loadFromUrl(startupUrl, false);
} else {
  input.value = sample;
  update();
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Counter</title>
  <style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: Helvetica, Arial, sans-serif;
    line-height: 1.6;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
  }

  textarea {
    width: 100%;
    min-height: 200px;
    margin: 10px 0;
    padding: 10px;
    font-size: 16px;
    font-family: monospace;
    border: 1px solid #ccc;
    border-radius: 4px;
  }

  button {
    background: #0066ff;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
  }

  button:disabled {
    background: #cccccc;
    cursor: not-allowed;
  }

  .output {
    background: #f5f5f5;
    padding: 20px;
    border-radius: 4px;
    margin-top: 20px;
    white-space: pre-wrap;
    font-family: monospace;
  }

  .error {
    color: #ff0000;
    margin: 10px 0;
  }

  .input-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
  }

  .file-drop-area {
    border: 2px dashed #ccc;
    border-radius: 4px;
    padding: 20px;
    text-align: center;
    margin: 20px 0;
    background: #f8fafc;
    cursor: pointer;
  }

  .file-drop-area.drag-over {
    background: #e2e8f0;
    border-color: #0066ff;
  }

  .file-list {
    margin: 10px 0;
  }

  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px;
    background: #f5f5f5;
    border-radius: 4px;
    margin: 4px 0;
  }

  .file-item button {
    background: #ff3333;
    padding: 4px 8px;
    font-size: 14px;
  }

  .file-item button:hover {
    background: #cc0000;
  }

  .model-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 16px;
    margin: 8px 0;
    align-items: flex-start;
  }

  .model-list label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-weight: normal;
    cursor: pointer;
    margin-bottom: 0;
  }

  .model-list input[type="checkbox"] {
    margin: 0;
  }

  .model-group {
    border: 1px dashed #9bb4d9;
    background: #f0f6ff;
    border-radius: 6px;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .model-group-note {
    font-size: 12px;
    color: #3b5a8a;
    font-style: italic;
  }

  .model-group-items {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
  }

  .results-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }

  .results-table th,
  .results-table td {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid #ddd;
  }

  .results-table th {
    background: #e8e8e8;
  }

  .results-table td.tokens,
  .results-table td.multiplier {
    font-family: monospace;
    text-align: right;
  }

  .multiplier-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: bold;
  }

  .multiplier-baseline {
    background: #d4edda;
    color: #155724;
  }

  .multiplier-higher {
    background: #fff3cd;
    color: #856404;
  }

  .result-error {
    color: #ff0000;
    font-family: monospace;
  }
  </style>
</head>
<body>
  <h1>Claude Token Counter</h1>

  <p>This tool uses your Anthropic API key to count tokens in text and images using <a href="https://platform.claude.com/docs/en/build-with-claude/token-counting">Anthropic's token counting API</a>.</p>

  <div class="input-group">
    <label for="system">System prompt:</label>
    <textarea id="system" style="min-height: 100px" placeholder="Enter system prompt (optional)"></textarea>
  </div>

  <div class="input-group">
    <label for="content">User message:</label>
    <textarea id="content" placeholder="Enter message content"></textarea>
  </div>

  <div class="file-drop-area" id="dropArea">
    <p>Drag and drop files here or click to select</p>
    <input type="file" id="fileInput" multiple style="display: none">
    <div class="file-list" id="fileList"></div>
  </div>

  <div class="input-group">
    <label>Models to compare:</label>
    <div class="model-list" id="modelList"></div>
  </div>

  <button id="count">Count Tokens</button>
  <div id="error" class="error"></div>
  <div id="output" class="output"></div>

<script type="module">
const API_URL = 'https://api.anthropic.com/v1/messages/count_tokens'
const MODEL_ENTRIES = [
  { type: 'model', id: 'claude-opus-4-7' },
  {
    type: 'group',
    note: 'These models share the same tokenizer',
    models: [
      'claude-opus-4-6',
      'claude-opus-4-5',
      'claude-sonnet-4-6',
      'claude-haiku-4-5'
    ]
  }
]
const DEFAULT_MODEL = 'claude-opus-4-7'

let attachedFiles = []

function getApiKey() {
  let key = localStorage.getItem('ANTHROPIC_API_KEY')
  if (!key) {
    key = prompt('Please enter your Anthropic API key:')
    if (key) {
      localStorage.setItem('ANTHROPIC_API_KEY', key)
    }
  }
  return key
}

function handleFiles(files) {
  for (const file of files) {
    if (file.type.startsWith('image/') || file.type === 'application/pdf') {
      readAndStoreFile(file)
    } else {
      errorDiv.textContent = `Unsupported file type: ${file.type}`
    }
  }
}

function readAndStoreFile(file) {
  const reader = new FileReader()
  reader.onload = function(e) {
    const base64Data = e.target.result.split(',')[1]
    attachedFiles.push({
      name: file.name,
      type: file.type,
      data: base64Data
    })
    updateFileList()
  }
  reader.readAsDataURL(file)
}

function updateFileList() {
  const fileList = document.getElementById('fileList')
  fileList.innerHTML = attachedFiles.map((file, index) => `
    <div class="file-item">
      <span>${file.name} (${file.type})</span>
      <button onclick="removeFile(${index})">Remove</button>
    </div>
  `).join('')
}

window.removeFile = function(index) {
  attachedFiles.splice(index, 1)
  updateFileList()
}

function buildMessages(content) {
  const messageContent = []

  for (const file of attachedFiles) {
    messageContent.push({
      type: file.type.startsWith('image/') ? 'image' : 'document',
      source: {
        type: 'base64',
        media_type: file.type,
        data: file.data
      }
    })
  }

  if (content.trim()) {
    messageContent.push({
      type: 'text',
      text: content
    })
  }

  return [{
    role: 'user',
    content: messageContent
  }]
}

async function countTokensForModel(model, system, messages, apiKey) {
  const response = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'x-api-key': apiKey,
      'content-type': 'application/json',
      'anthropic-version': '2023-06-01',
      'anthropic-beta': 'token-counting-2024-11-01,pdfs-2024-09-25',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model,
      system: system || undefined,
      messages
    })
  })

  if (!response.ok) {
    const error = await response.text()
    throw new Error(error)
  }

  return response.json()
}

function getSelectedModels() {
  return [...document.querySelectorAll('#modelList input[type="checkbox"]:checked')]
    .map(cb => cb.value)
}

function renderResults(results) {
  const successful = results.filter(r => r.ok)
  const minTokens = successful.length
    ? Math.min(...successful.map(r => r.tokens))
    : null

  const rows = results.map(r => {
    if (!r.ok) {
      return `<tr>
        <td>${r.model}</td>
        <td class="result-error" colspan="2">Error: ${escapeHtml(r.error)}</td>
      </tr>`
    }
    const ratio = r.tokens / minTokens
    const isBaseline = r.tokens === minTokens
    const badgeClass = isBaseline ? 'multiplier-baseline' : 'multiplier-higher'
    const label = `${ratio.toFixed(2)}x`
    return `<tr>
      <td>${r.model}</td>
      <td class="tokens">${r.tokens.toLocaleString()}</td>
      <td class="multiplier"><span class="multiplier-badge ${badgeClass}">${label}</span></td>
    </tr>`
  }).join('')

  return `<table class="results-table">
    <thead>
      <tr><th>Model</th><th style="text-align: right">Tokens</th><th style="text-align: right">vs. lowest</th></tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
}

const systemInput = document.getElementById('system')
const contentInput = document.getElementById('content')
const countButton = document.getElementById('count')
const errorDiv = document.getElementById('error')
const outputDiv = document.getElementById('output')
const dropArea = document.getElementById('dropArea')
const fileInput = document.getElementById('fileInput')
const modelList = document.getElementById('modelList')

function renderCheckbox(model) {
  return `
    <label>
      <input type="checkbox" value="${model}" ${model === DEFAULT_MODEL ? 'checked' : ''}>
      ${model}
    </label>
  `
}

modelList.innerHTML = MODEL_ENTRIES.map(entry => {
  if (entry.type === 'model') {
    return renderCheckbox(entry.id)
  }
  return `
    <div class="model-group">
      <div class="model-group-items">
        ${entry.models.map(renderCheckbox).join('')}
      </div>
      <div class="model-group-note">${entry.note}</div>
    </div>
  `
}).join('')

// File upload handling
dropArea.addEventListener('click', () => fileInput.click())
fileInput.addEventListener('change', (e) => handleFiles(e.target.files))

dropArea.addEventListener('dragover', (e) => {
  e.preventDefault()
  dropArea.classList.add('drag-over')
})

dropArea.addEventListener('dragleave', () => {
  dropArea.classList.remove('drag-over')
})

dropArea.addEventListener('drop', (e) => {
  e.preventDefault()
  dropArea.classList.remove('drag-over')
  handleFiles(e.dataTransfer.files)
})

countButton.addEventListener('click', async () => {
  errorDiv.textContent = ''
  outputDiv.textContent = ''

  const selected = getSelectedModels()
  if (selected.length === 0) {
    errorDiv.textContent = 'Select at least one model to compare.'
    return
  }

  const apiKey = getApiKey()
  if (!apiKey) {
    errorDiv.textContent = 'API key is required'
    return
  }

  outputDiv.textContent = 'Counting tokens...'
  countButton.disabled = true

  const system = systemInput.value.trim()
  const messages = buildMessages(contentInput.value.trim())

  try {
    const settled = await Promise.all(selected.map(async model => {
      try {
        const data = await countTokensForModel(model, system, messages, apiKey)
        return { model, ok: true, tokens: data.input_tokens, data }
      } catch (err) {
        return { model, ok: false, error: err.message }
      }
    }))
    outputDiv.innerHTML = renderResults(settled)
  } catch (error) {
    errorDiv.textContent = error.message
    outputDiv.textContent = ''
  } finally {
    countButton.disabled = false
  }
})
</script>
</body>
</html>

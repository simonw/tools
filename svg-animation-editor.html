/* --- SVG import: convert basic elements into editable shapes --- */
function importSVG(text) {
  const doc = new DOMParser().parseFromString(text, 'image/svg+xml');
  const svg = doc.querySelector('svg');
  if (!svg || doc.querySelector('parsererror')) { alert('Could not parse that SVG.'); return; }
  pushUndo();
  if (!project.shapes.length) {
    const vb = (svg.getAttribute('viewBox') || '').split(/[\s,]+/).map(Number);
    const w = parseFloat(svg.getAttribute('width')) || (vb.length === 4 ? vb[2] : 0);
    const h = parseFloat(svg.getAttribute('height')) || (vb.length === 4 ? vb[3] : 0);
    if (w && h) { project.width = Math.round(w); project.height = Math.round(h); }
  }
  let added = 0, skipped = 0;
  const style = el => {
    const g = a => el.getAttribute(a) ?? (el.style && el.style[a === 'stroke-width' ? 'strokeWidth' : a]) ?? null;
    const s = {};
    const fill = g('fill'), stroke = g('stroke');
    if (fill !== null && fill !== '') s.fill = normColor(fill);
    if (stroke !== null && stroke !== '') s.stroke = normColor(stroke);
    const sw = parseFloat(g('stroke-width')); if (!isNaN(sw)) s.strokeWidth = sw;
    const op = parseFloat(g('opacity')); if (!isNaN(op)) s.opacity = op;
    return s;
  };
  const num = (el, a, d) => { const v = parseFloat(el.getAttribute(a)); return isNaN(v) ? (d || 0) : v; };

  for (const el of svg.querySelectorAll('rect,circle,ellipse,line,polyline,polygon,path,text')) {
    let sh = null;
    const st = style(el);
    switch (el.tagName.toLowerCase()) {
      case 'rect':
        sh = makeShape('rect', { x: num(el, 'x'), y: num(el, 'y'), w: num(el, 'width'), h: num(el, 'height'), rx: num(el, 'rx') }, st);
        break;
      case 'circle':
        sh = makeShape('ellipse', { cx: num(el, 'cx'), cy: num(el, 'cy'), rx: num(el, 'r'), ry: num(el, 'r') }, st);
        break;
      case 'ellipse':
        sh = makeShape('ellipse', { cx: num(el, 'cx'), cy: num(el, 'cy'), rx: num(el, 'rx'), ry: num(el, 'ry') }, st);
        break;
      case 'line':
        sh = makeShape('line', { x1: num(el, 'x1'), y1: num(el, 'y1'), x2: num(el, 'x2'), y2: num(el, 'y2') }, st);
        break;
      case 'polygon': case 'polyline': {
        const pts = (el.getAttribute('points') || '').trim().split(/[\s,]+/).map(Number).filter(n => !isNaN(n));
        if (pts.length >= 6) sh = makeShape('polygon', { points: pts }, st);
        break;
      }
      case 'path': {
        const subs = parsePathToAnchors(el.getAttribute('d') || '');
        for (const sub of subs) {
          if (sub.anchors.length < 2) continue;
          const psh = makeShape('path', { anchors: sub.anchors }, st);
          psh.base.closed = sub.closed;
          project.shapes.push(psh);
          added++;
        }
        break;
      }
      case 'text': {
        sh = makeShape('text', { x: num(el, 'x'), y: num(el, 'y'), fontSize: parseFloat(el.getAttribute('font-size')) || 16 }, st);
        sh.base.text = el.textContent.trim();
        sh.base.fontFamily = el.getAttribute('font-family') || 'sans-serif';
        break;
      }
    }
    if (sh) { project.shapes.push(sh); added++; }
    else if (el.tagName.toLowerCase() !== 'path') skipped++;
  }
  commitStructural();
  if (!added) alert('No supported shapes found in that SVG (arcs and groups with transforms are not imported).');
}

/* parse an SVG path "d" into cubic-bezier anchor subpaths */
function parsePathToAnchors(d) {
  const tokens = d.match(/[achlmqstvz]|-?\.?\d+(?:\.\d+)?(?:e-?\d+)?/gi) || [];
  let i = 0, cmd = '', cx = 0, cy = 0, sx = 0, sy = 0, px = null, py = null;
  const subs = [];
  let cubics = [];   // [x0,y0, c1x,c1y, c2x,c2y, x1,y1]
  const readN = () => parseFloat(tokens[i++]);
  const isNum = () => i < tokens.length && !/[a-z]/i.test(tokens[i]);
  const flush = closed => {
    if (cubics.length) subs.push({ closed, cubics });
    cubics = [];
  };
  while (i < tokens.length) {
    if (/[a-z]/i.test(tokens[i])) cmd = tokens[i++];
    const rel = cmd === cmd.toLowerCase();
    const C = cmd.toUpperCase();
    if (C === 'Z') { if (cubics.length && (cx !== sx || cy !== sy)) cubics.push([cx, cy, cx, cy, sx, sy, sx, sy]); flush(true); cx = sx; cy = sy; px = py = null; if (!isNum()) continue; cmd = 'L'; continue; }
    if (C === 'M') {
      flush(false);
      const x = readN(), y = readN();
      cx = rel ? cx + x : x; cy = rel ? cy + y : y;
      sx = cx; sy = cy; px = py = null;
      cmd = rel ? 'l' : 'L';
      continue;
    }
    let x1, y1, x2, y2, x, y;
    switch (C) {
      case 'L': x = readN(); y = readN(); if (rel) { x += cx; y += cy; }
        cubics.push([cx, cy, cx, cy, x, y, x, y]); cx = x; cy = y; px = py = null; break;
      case 'H': x = readN(); if (rel) x += cx;
        cubics.push([cx, cy, cx, cy, x, cy, x, cy]); cx = x; px = py = null; break;
      case 'V': y = readN(); if (rel) y += cy;
        cubics.push([cx, cy, cx, cy, cx, y, cx, y]); cy = y; px = py = null; break;
      case 'C':
        x1 = readN(); y1 = readN(); x2 = readN(); y2 = readN(); x = readN(); y = readN();
        if (rel) { x1 += cx; y1 += cy; x2 += cx; y2 += cy; x += cx; y += cy; }
        cubics.push([cx, cy, x1, y1, x2, y2, x, y]); px = x2; py = y2; cx = x; cy = y; break;
      case 'S':
        x2 = readN(); y2 = readN(); x = readN(); y = readN();
        if (rel) { x2 += cx; y2 += cy; x += cx; y += cy; }
        x1 = px !== null ? 2 * cx - px : cx; y1 = py !== null ? 2 * cy - py : cy;
        cubics.push([cx, cy, x1, y1, x2, y2, x, y]); px = x2; py = y2; cx = x; cy = y; break;
      case 'Q': {
        x1 = readN(); y1 = readN(); x = readN(); y = readN();
        if (rel) { x1 += cx; y1 += cy; x += cx; y += cy; }
        const c1x = cx + 2 / 3 * (x1 - cx), c1y = cy + 2 / 3 * (y1 - cy);
        const c2x = x + 2 / 3 * (x1 - x), c2y = y + 2 / 3 * (y1 - y);
        cubics.push([cx, cy, c1x, c1y, c2x, c2y, x, y]); px = x1; py = y1; cx = x; cy = y; break;
      }
      case 'T': {
        x = readN(); y = readN();
        if (rel) { x += cx; y += cy; }
        const qx = px !== null ? 2 * cx - px : cx, qy = py !== null ? 2 * cy - py : cy;
        const c1x = cx + 2 / 3 * (qx - cx), c1y = cy + 2 / 3 * (qy - cy);
        const c2x = x + 2 / 3 * (qx - x), c2y = y + 2 / 3 * (qy - y);
        cubics.push([cx, cy, c1x, c1y, c2x, c2y, x, y]); px = qx; py = qy; cx = x; cy = y; break;
      }
      case 'A': { // arc: approximate as straight line to endpoint
        readN(); readN(); readN(); readN(); readN();
        x = readN(); y = readN();
        if (rel) { x += cx; y += cy; }
        cubics.push([cx, cy, cx, cy, x, y, x, y]); cx = x; cy = y; px = py = null; break;
      }
      default: i++; continue;
    }
  }
  flush(false);
  /* cubic segment list -> anchors with relative handles */
  return subs.map(({ closed, cubics }) => {
    const anchors = [];
    for (let k = 0; k < cubics.length; k++) {
      const c = cubics[k];
      if (k === 0) anchors.push([c[0], c[1], 0, 0, c[2] - c[0], c[3] - c[1]]);
      else {
        const a = anchors[anchors.length - 1];
        a[4] = cubics[k][2] - a[0]; a[5] = cubics[k][3] - a[1];
      }
      anchors.push([c[6], c[7], c[4] - c[6], c[5] - c[7], 0, 0]);
    }
    if (closed && anchors.length > 1) {
      const first = anchors[0], last = anchors[anchors.length - 1];
      if (Math.hypot(first[0] - last[0], first[1] - last[1]) < 0.5) {
        first[2] = last[2]; first[3] = last[3];
        anchors.pop();
      }
    }
    return { closed, anchors };
  });
}

/* =====================================================================
   DEMO PROJECT + INIT
   ===================================================================== */
function star(cxx, cyy, R, r, n) {
  const pts = [];
  for (let i = 0; i < n * 2; i++) {
    const a = -Math.PI / 2 + i * Math.PI / n;
    const rad = i % 2 === 0 ? R : r;
    pts.push(f2(cxx + rad * Math.cos(a)), f2(cyy + rad * Math.sin(a)));
  }
  return pts;
}

function demoProject() {
  const p = blankProject();
  p.background = '#12122b';
  p.duration = 4;

  const ball = makeShapeIn(p, 'ellipse', { cx: 110, cy: 120, rx: 34, ry: 34 }, { fill: '#f74f6e', stroke: 'none' });
  ball.name = 'Ball';
  ball.tracks.cx = [{ t: 0, v: 110, e: LINEAR.slice() }, { t: 4, v: 690, e: LINEAR.slice() }];
  ball.tracks.cy = [
    { t: 0, v: 120, e: [0.5, 0, 1, 0.6] }, { t: 1, v: 428, e: [0, 0.4, 0.5, 1] },
    { t: 2, v: 170, e: [0.5, 0, 1, 0.6] }, { t: 3, v: 428, e: [0, 0.4, 0.5, 1] },
    { t: 4, v: 230, e: LINEAR.slice() },
  ];
  ball.tracks.ry = [
    { t: 0.9, v: 34, e: DEF_EASE.slice() }, { t: 1, v: 22, e: DEF_EASE.slice() }, { t: 1.15, v: 34, e: DEF_EASE.slice() },
    { t: 2.9, v: 34, e: DEF_EASE.slice() }, { t: 3, v: 24, e: DEF_EASE.slice() }, { t: 3.15, v: 34, e: DEF_EASE.slice() },
  ];
  ball.tracks.fill = [{ t: 0, v: '#f74f6e', e: LINEAR.slice() }, { t: 4, v: '#8b5cf6', e: LINEAR.slice() }];

  const st = makeShapeIn(p, 'polygon', { points: star(400, 240, 92, 38, 5) }, { fill: '#ffd34d', stroke: 'none', opacity: 0.9 });
  st.name = 'Star';
  st.tracks.points = [
    { t: 0, v: star(400, 240, 92, 38, 5), e: [0.42, 0, 0.58, 1] },
    { t: 2, v: star(400, 240, 80, 74, 5), e: [0.42, 0, 0.58, 1] },
    { t: 4, v: star(400, 240, 92, 38, 5), e: LINEAR.slice() },
  ];
  st.tracks.rotation = [{ t: 0, v: 0, e: LINEAR.slice() }, { t: 4, v: 72, e: LINEAR.slice() }];

  const title = makeShapeIn(p, 'text', { x: 250, y: 460, fontSize: 34 }, { fill: '#ffffff', stroke: 'none' });
  title.name = 'Title';
  title.base.text = 'SVG Animation Editor';
  title.tracks.opacity = [{ t: 0, v: 0, e: [0, 0, 0.58, 1] }, { t: 0.9, v: 1, e: LINEAR.slice() }];
  title.tracks.y = [{ t: 0, v: 482, e: [0, 0, 0.58, 1] }, { t: 0.9, v: 460, e: LINEAR.slice() }];
  return p;
}
function makeShapeIn(p, type, geom, style) {
  const saved = project;
  project = p;
  const sh = makeShape(type, geom, style);
  p.shapes.push(sh);
  project = saved;
  return sh;
}

function init() {
  let restored = null;
  try { restored = JSON.parse(localStorage.getItem(AUTOSAVE_KEY)); } catch (e) { /* ignore */ }
  project = restored && Array.isArray(restored.shapes)
    ? Object.assign(blankProject(), restored)
    : demoProject();
  if (matchMedia('(max-width: 820px)').matches) $('zoomSel').value = 'fit';
  setTool('select');
  updateUndoButtons();
  commitStructural();
  updatePlayhead();
}
init();
